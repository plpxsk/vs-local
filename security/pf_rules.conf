# macOS pf firewall rules for vs-local
# Block all outbound traffic for Ollama except localhost
#
# Installation:
#   sudo cp pf_rules.conf /etc/pf.anchors/vs-local
#   Add to /etc/pf.conf:  anchor "vs-local"  and  load anchor "vs-local" from "/etc/pf.anchors/vs-local"
#   sudo pfctl -f /etc/pf.conf
#   sudo pfctl -e

# Allow Ollama to communicate on localhost only
pass out quick on lo0 proto tcp from any to 127.0.0.1 port 11434
pass out quick on lo0 proto tcp from any to 127.0.0.1 port 1234

# Block Ollama from making any external connections
block out quick proto tcp from any to any user _ollama
